<div class="modal-body">
  <h5>Transcribing Audio</h5>
  <p>Please wait while we transcribe your audio. This may take a moment for longer recordings.</p>
  <form method="post">
    <input type="hidden" name="confirm_transcribe" value="true">
    <button type="submit" class="btn btn-primary">Continue</button>
    <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
